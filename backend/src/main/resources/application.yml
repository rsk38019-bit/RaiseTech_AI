server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/taskmanagement
    username: taskuser
    password: taskpass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  mvc:
    charset: UTF-8
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
